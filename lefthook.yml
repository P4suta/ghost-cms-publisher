# lefthook git hooks. Install with `just hooks`.
#
# Formatters use stage_fixed: lefthook re-stages the files it reformats. CI re-runs
# the same checks in --check mode.

assert_lefthook_installed: true

pre-commit:
  parallel: false
  commands:
    cargo-fmt:
      glob: "*.rs"
      run: cargo fmt -- {staged_files}
      stage_fixed: true
    taplo-fmt:
      glob: "*.toml"
      run: taplo fmt {staged_files}
      stage_fixed: true
    cargo-sort:
      glob: "{**/Cargo.toml,Cargo.lock}"
      run: cargo sort --workspace --grouped
      stage_fixed: true
    typos-fix:
      run: typos --write-changes {staged_files}
      stage_fixed: true
    clippy:
      glob: "*.rs"
      run: cargo clippy --workspace --all-targets -- -D warnings

commit-msg:
  commands:
    committed:
      run: committed --commit-file {1}

pre-push:
  piped: true
  commands:
    lint:
      run: just lint
    test:
      run: just test

name: Security audit

# Advisory scanning lives here, off the PR critical path: the RUSTSEC database
# changes daily, so a fresh advisory must not turn an unrelated PR red. A failure
# here surfaces on the Actions tab (and emails the maintainer) without blocking.

on:
  schedule:
    - cron: "33 4 * * 1"
  push:
    branches: [main]
    paths:
      - "Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  advisories:
    name: cargo-deny advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6 # v2.82.6
        with:
          tool: cargo-deny
      - run: cargo deny check advisories

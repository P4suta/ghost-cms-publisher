name: Release

# Triggered by a `v*` tag (from release-plz or a manual push). `workflow_dispatch`
# runs the build legs as a dry run (the publish job is skipped without a tag).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: release-${{ matrix.target }}

      - name: Build both binaries
        run: cargo build --release --locked --target ${{ matrix.target }} -p ghost-cms-cli -p ghost-cms-mcp

      - name: Assemble archive
        id: assemble
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="v0.0.0-dispatch"
          fi
          name="ghost-cms-publisher-${tag}-${{ matrix.target }}"
          staging="${RUNNER_TEMP}/${name}"
          mkdir -p "${staging}/completions" "${staging}/man/man1"

          sfx=""
          [[ "${{ matrix.archive }}" == "zip" ]] && sfx=".exe"
          tdir="target/${{ matrix.target }}/release"
          cli="${tdir}/ghost-cms${sfx}"
          cp "${cli}" "${tdir}/ghost-cms-mcp${sfx}" "${staging}/"

          # Shell completions, generated by the just-built CLI (runs natively on
          # this leg's OS).
          for sh in bash elvish fish powershell zsh; do
            case "$sh" in
              bash) out="ghost-cms.bash" ;;
              zsh) out="_ghost-cms" ;;
              fish) out="ghost-cms.fish" ;;
              powershell) out="_ghost-cms.ps1" ;;
              elvish) out="ghost-cms.elv" ;;
            esac
            "${cli}" completions "$sh" > "${staging}/completions/${out}"
          done

          # Man pages: one call emits ghost-cms.1 plus ghost-cms-<sub>.1 per subcommand.
          "${cli}" man "${staging}/man/man1"

          cp LICENSE-APACHE LICENSE-MIT README.md "${staging}/"

          cd "${RUNNER_TEMP}"
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            7z a "${name}.zip" "${name}" >/dev/null
            art="${name}.zip"
          else
            tar czf "${name}.tar.gz" "${name}"
            art="${name}.tar.gz"
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${art}" > "${art}.sha256"
          else
            shasum -a 256 "${art}" > "${art}.sha256"
          fi
          echo "artifact=${RUNNER_TEMP}/${art}" >> "$GITHUB_OUTPUT"
          echo "checksum=${RUNNER_TEMP}/${art}.sha256" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ steps.assemble.outputs.artifact }}
            ${{ steps.assemble.outputs.checksum }}
          retention-days: 7
          if-no-files-found: error

  publish:
    name: publish
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Aggregate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum ghost-cms-publisher-*.tar.gz ghost-cms-publisher-*.zip > SHA256SUMS
          cat SHA256SUMS

      - name: Provenance attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "dist/ghost-cms-publisher-*.tar.gz,dist/ghost-cms-publisher-*.zip"

      - name: Extract release notes
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          awk -v ver="$ver" '
            $0 ~ "^## \\[" ver "\\]" { f = 1; next }
            f && /^## \[/ { exit }
            f && /^\[[^]]+\]: / { exit }
            f { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > RELEASE_NOTES.md
          fi
          cat RELEASE_NOTES.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          files: |
            dist/ghost-cms-publisher-*.tar.gz
            dist/ghost-cms-publisher-*.zip
            dist/*.sha256
            dist/SHA256SUMS

version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 10
    groups:
      rust-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    commit-message:
      prefix: build
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: ci

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
version = 2
yanked = "deny"
# Transitive-only advisories; each entry notes why it is safe here.
ignore = [
    "RUSTSEC-2024-0320", # yaml-rust — via comrak → syntect (Markdown rendering)
    "RUSTSEC-2025-0141", # bincode 1.x — via comrak → syntect (Markdown rendering)
    "RUSTSEC-2023-0071", # rsa (Marvin) — via jsonwebtoken rust_crypto; RSA unused (HS256 only)
]

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "0BSD",
    "Unlicense",
    "CDLA-Permissive-2.0",            # webpki-roots: Mozilla CA bundle data license (permissive)
    "MITNFA",                         # fmt2io: MIT +no-false-attribs, via comrak (permissive)
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
# We use rustls; keep OpenSSL out of the tree.
deny = [{ name = "openssl" }, { name = "openssl-sys" }]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

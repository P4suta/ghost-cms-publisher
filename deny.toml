[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
version = 2
yanked = "deny"
# All four are *unmaintained* advisories (informational, not vulnerabilities) on
# transitive dependencies with no safe upgrade available. Revisit when an upstream
# release drops them.
ignore = [
    "RUSTSEC-2024-0320", # yaml-rust — via comrak → syntect (Markdown rendering)
    "RUSTSEC-2024-0436", # paste — via rmcp (MCP server macros)
    "RUSTSEC-2025-0057", # fxhash — via inquire's fuzzy matcher (interactive pick)
    "RUSTSEC-2025-0141", # bincode 1.x — via comrak → syntect (Markdown rendering)
]

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "0BSD",
    "Unlicense",
    "CDLA-Permissive-2.0",            # webpki-roots: Mozilla CA bundle data license (permissive)
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
# rustls を採用しているので OpenSSL は混入させない。
deny = [{ name = "openssl" }, { name = "openssl-sys" }]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
